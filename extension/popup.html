<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeNet</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <span class="logo-icon">🛡️</span>
        <div>
          <h1>SafeNet</h1>
          <p class="subtitle">Threat Monitor</p>
        </div>
      </div>
      <div id="status-indicator" class="status-badge safe">
        <span class="status-dot"></span>
        Safe
      </div>
    </div>

    <!-- Safety Score -->
    <div class="score-section">
      <div class="score-label">Page Safety Score</div>
      <div class="score-container">
        <div class="score-ring" id="score-ring">
          <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="none" stroke="#334155" stroke-width="8"/>
            <circle id="score-circle" cx="50" cy="50" r="45" fill="none" 
                    stroke="#10B981" stroke-width="8" 
                    stroke-dasharray="283" stroke-dashoffset="0"
                    stroke-linecap="round" transform="rotate(-90 50 50)"/>
          </svg>
          <div class="score-text" id="score-text">100%</div>
        </div>
      </div>
    </div>

    <!-- Scan Button -->
    <button id="scan-btn" class="scan-btn">
      <span class="scan-icon">🔍</span>
      Scan This Page
    </button>

    <!-- Results -->
    <div id="results" class="results hidden">
      <div class="results-header">
        <h2>Scan Results</h2>
      </div>
      
      <div id="result-content" class="result-content">
        <!-- Results will be inserted here -->
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="actions">
      <button id="toggle-highlight" class="action-btn">
        <span>🎨</span>
        Toggle Highlights
      </button>
      <button id="open-dashboard" class="action-btn">
        <span>📊</span>
        Open Dashboard
      </button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>SafeNet v1.0 — Hackathon MVP</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
